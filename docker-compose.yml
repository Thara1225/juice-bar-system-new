services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: juice_bar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d juice_bar_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/juice_bar_db}
      CLIENT_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - server

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "8083:8083"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/broker/version"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mosquitto_data:
