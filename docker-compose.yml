services:
  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      CLIENT_URL: http://localhost:5173

  client:
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - server
